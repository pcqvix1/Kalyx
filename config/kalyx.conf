# Kalyx build defaults. Override any value in the environment before running
# scripts, for example: KALYX_WORKDIR=/home/bianc/kalyx-work bash scripts/host-check

KALYX_NAME="${KALYX_NAME:-Kalyx}"
KALYX_ID="${KALYX_ID:-kalyx}"
KALYX_VERSION="${KALYX_VERSION:-0.1.0}"
KALYX_ARCH="${KALYX_ARCH:-x86_64}"
KALYX_TARGET_TRIPLET="${KALYX_TARGET_TRIPLET:-x86_64-kalyx-linux-gnu}"

KALYX_LFS_RELEASE="${KALYX_LFS_RELEASE:-13.0-systemd}"
KALYX_LFS_DOWNLOAD_BASE="${KALYX_LFS_DOWNLOAD_BASE:-https://www.linuxfromscratch.org/lfs/downloads/stable-systemd}"

KALYX_LOCALE="${KALYX_LOCALE:-pt_BR.UTF-8}"
KALYX_KEYMAP="${KALYX_KEYMAP:-br-abnt2}"
KALYX_TIMEZONE="${KALYX_TIMEZONE:-America/Sao_Paulo}"

KALYX_WORKDIR="${KALYX_WORKDIR:-$HOME/kalyx-work}"
KALYX_SOURCES="${KALYX_SOURCES:-$KALYX_WORKDIR/sources}"
KALYX_BUILD="${KALYX_BUILD:-$KALYX_WORKDIR/build}"
KALYX_ROOTFS="${KALYX_ROOTFS:-$KALYX_WORKDIR/rootfs}"
KALYX_PACKAGES="${KALYX_PACKAGES:-$KALYX_WORKDIR/packages}"
KALYX_ISO="${KALYX_ISO:-$KALYX_WORKDIR/iso}"
KALYX_TOOLS="${KALYX_TOOLS:-$KALYX_WORKDIR/tools}"
KALYX_LOGDIR="${KALYX_LOGDIR:-$KALYX_WORKDIR/logs}"

KALYX_ISO_LABEL="${KALYX_ISO_LABEL:-KALYX_LIVE}"
KALYX_LIVE_USER="${KALYX_LIVE_USER:-kalyx}"
KALYX_INSTALL_MOUNT="${KALYX_INSTALL_MOUNT:-/mnt/kalyx-target}"

